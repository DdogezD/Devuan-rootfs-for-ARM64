name: Devuan ARM64 Rootfs

on:
  workflow_dispatch:
    inputs:
      timezone:
        description: 'Timezone for rootfs'
        required: false
        default: 'Asia/Shanghai'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget curl ca-certificates gnupg \
            qemu-user-static binfmt-support \
            uidmap fakeroot fakechroot \
            eatmydata tar xz-utils arch-test \
            dpkg-dev gzip

      - name: Enable QEMU binfmt
        run: |
          sudo update-binfmts --enable qemu-aarch64 || true

      - name: Install mmdebstrap
        run: |
          MMDEB=$(wget -qO- https://ftp.debian.org/debian/pool/main/m/mmdebstrap/ \
            | grep -oE 'mmdebstrap_[^"]+_all\.deb' \
            | sort -V | tail -n1)

          wget https://ftp.debian.org/debian/pool/main/m/mmdebstrap/${MMDEB}
          sudo dpkg -i ${MMDEB} || sudo apt-get -fy install

      - name: Fetch Devuan keyring dynamically
        run: |
          set -e

          BASE="http://deb.devuan.org/merged"

          wget -q ${BASE}/dists/excalibur/main/binary-all/Packages.gz
          gunzip Packages.gz

          FILE=$(awk '
            $1=="Filename:" && $2 ~ /devuan-keyring/ {print $2}
          ' Packages | tail -n1)

          echo "FOUND KEYRING: $FILE"

          wget ${BASE}/${FILE}

          dpkg-deb -x $(basename $FILE) keyring

          ls -R keyring

      - name: Build rootfs with mmdebstrap
        run: |
          sudo eatmydata mmdebstrap \
            --mode=auto \
            --architectures=arm64 \
            --skip=check/empty \
            --keyring=keyring/usr/share/keyrings/devuan-archive-keyring.gpg \
            --include="\
              coreutils,\
              bash,\
              sudo,\
              util-linux,\
              findutils,\
              grep,\
              sed,\
              gawk,\
              diffutils,\
              iproute2,\
              iputils-ping,\
              procps,\
              psmisc,\
              lsof,\
              curl,\
              wget,\
              git,\
              make,\
              tar,\
              gzip,\
              xz-utils,\
              file,\
              nano,\
              ca-certificates,\
              gnupg,\
              locales,\
              xfce4,\
              xfce4-terminal,\
              mousepad,\
              menulibre,\
              thunar-archive-plugin,\
              dbus,\
              dbus-daemon,\
              dbus-system-bus-common,\
              consolekit,\
              mesa-utils,\
              fontconfig,\
              fonts-dejavu-core,\
              fonts-noto,\
              fonts-noto-cjk,\
              fonts-noto-cjk-extra" \
            excalibur \
            rootfs \
            "deb http://deb.devuan.org/merged excalibur main contrib non-free"

      - name: Apply post-install fixes
        run: |
          set -e

          echo "=== Remove problematic packages ==="
          sudo chroot rootfs apt-get remove -y --purge elogind libpam-elogind 2>/dev/null || true
          sudo chroot rootfs apt-get remove -y --purge colord xiccd accountsservice 2>/dev/null || true
          sudo rm -f rootfs/etc/xdg/autostart/xiccd.desktop

          echo "=== Remove pam_elogind from PAM config ==="
          if [ -f rootfs/etc/pam.d/common-session ]; then
            sudo sed -i '/pam_elogind\.so/d' rootfs/etc/pam.d/common-session
          fi

          echo "=== Set timezone ==="
          sudo ln -sf "/usr/share/zoneinfo/${{ inputs.timezone }}" rootfs/etc/localtime

          echo "=== Fix DNS (no systemd-resolved in chroot) ==="
          echo "nameserver 8.8.8.8" | sudo tee rootfs/etc/resolv.conf

          echo "=== Fix hosts (add hostname to localhost line) ==="
          sudo sed -i 's/^127\.0\.0\.1.*localhost/127.0.0.1 localhost/' rootfs/etc/hosts

          echo "=== Disable ConsoleKit D-Bus service (no VT in chroot) ==="
          sudo mv rootfs/usr/share/dbus-1/system-services/org.freedesktop.ConsoleKit.service \
                  rootfs/usr/share/dbus-1/system-services/org.freedesktop.ConsoleKit.service.disabled 2>/dev/null || true

          echo "=== Fix notifyd to bypass systemctl ==="
          if [ -f rootfs/etc/xdg/autostart/xfce4-notifyd.desktop ]; then
            sudo sed -i 's|^Exec=.*|Exec=/usr/lib/aarch64-linux-gnu/xfce4/notifyd/xfce4-notifyd|' rootfs/etc/xdg/autostart/xfce4-notifyd.desktop
          fi

          echo "=== Setup locales ==="
          sudo sed -i 's/^# *en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' rootfs/etc/locale.gen
          sudo sed -i 's/^# *zh_CN.UTF-8 UTF-8/zh_CN.UTF-8 UTF-8/' rootfs/etc/locale.gen
          sudo chroot rootfs locale-gen
          echo "LANG=en_US.UTF-8" | sudo tee rootfs/etc/default/locale

          echo "=== CJK font priority (SC over JP for en_US) ==="
          sudo mkdir -p rootfs/etc/fonts/conf.d
          sudo tee rootfs/etc/fonts/conf.d/71-fonts-noto-cjk-sc-default.conf << 'FONTCONF' > /dev/null
          <?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "fonts.dtd">
          <fontconfig>
            <!-- Default to SC variants when non-CJK language is in use (e.g. en_US) -->

            <match target="pattern">
              <test name="lang" qual="any">
                <string>en</string>
              </test>
              <test name="family">
                <string>serif</string>
              </test>
              <edit name="family" mode="prepend">
                <string>Noto Serif CJK SC</string>
              </edit>
            </match>

            <match target="pattern">
              <test name="lang" qual="any">
                <string>en</string>
              </test>
              <test name="family">
                <string>sans-serif</string>
              </test>
              <edit name="family" mode="prepend">
                <string>Noto Sans CJK SC</string>
              </edit>
            </match>

            <match target="pattern">
              <test name="lang" qual="any">
                <string>en</string>
              </test>
              <test name="family">
                <string>monospace</string>
              </test>
              <edit name="family" mode="prepend">
                <string>Noto Sans Mono CJK SC</string>
              </edit>
            </match>

            <!-- Also handle undetermined (no lang set) -->
            <match target="pattern">
              <test name="lang" qual="any">
                <string>und</string>
              </test>
              <test name="family">
                <string>serif</string>
              </test>
              <edit name="family" mode="prepend">
                <string>Noto Serif CJK SC</string>
              </edit>
            </match>

            <match target="pattern">
              <test name="lang" qual="any">
                <string>und</string>
              </test>
              <test name="family">
                <string>sans-serif</string>
              </test>
              <edit name="family" mode="prepend">
                <string>Noto Sans CJK SC</string>
              </edit>
            </match>

            <match target="pattern">
              <test name="lang" qual="any">
                <string>und</string>
              </test>
              <test name="family">
                <string>monospace</string>
              </test>
              <edit name="family" mode="prepend">
                <string>Noto Sans Mono CJK SC</string>
              </edit>
            </match>
          </fontconfig>
          FONTCONF

      - name: Install JetBrainsMono Nerd Fonts
        run: |
          set -e
          NERD_VERSION=$(curl -s https://api.github.com/repos/ryanoasis/nerd-fonts/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "Nerd Fonts version: $NERD_VERSION"
          NERD_URL="https://github.com/ryanoasis/nerd-fonts/releases/download/${NERD_VERSION}/JetBrainsMono.zip"
          curl -fsSL -o /tmp/JetBrainsMono.zip "$NERD_URL"
          sudo mkdir -p rootfs/usr/local/share/fonts/JetBrainsMono
          sudo unzip -qo /tmp/JetBrainsMono.zip -d rootfs/usr/local/share/fonts/JetBrainsMono/
          sudo chroot rootfs fc-cache -fv /usr/local/share/fonts/JetBrainsMono 2>/dev/null || true
          rm -f /tmp/JetBrainsMono.zip

      - name: Clean rootfs
        run: |
          sudo rm -rf rootfs/var/lib/apt/lists/* || true
          sudo rm -rf rootfs/var/cache/apt/* || true
          sudo find rootfs/var/log -type f -delete || true

      - name: Package rootfs
        run: |
          sudo tar --numeric-owner --acls --xattrs \
            -czf devuan.tar.gz \
            -C rootfs .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: devuan-excalibur-arm64-rootfs-${{ github.run_id }}
          name: Devuan Excalibur ARM64 Rootfs
          files: devuan.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
